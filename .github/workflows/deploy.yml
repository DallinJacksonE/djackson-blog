name: Deploy to Home Lab

on:
  push:
    branches:
      - main # Triggers the action when code is pushed to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

      - name: Execute Remote Deployment via Cloudflare Tunnel
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          CF_HOSTNAME: ${{ secrets.CF_HOSTNAME }}
        run: |
          # 1. Set up the SSH directory and private key
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          
          # 2. Connect and execute the Docker Compose rebuild
          ssh -T -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ProxyCommand="cloudflared access ssh --hostname %h" -i ~/.ssh/id_ed25519 $SERVER_USER@$CF_HOSTNAME << 'EOF'
            set -x
          
            cd /home/dj/djackson-blog
            
            # Pull any new changes securely using the deploy key
            GIT_SSH_COMMAND="ssh -i ~/.ssh/djackson-blog-pull -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" git pull origin main
            
            docker compose up -d --build
            
            # Clean up old unused images to save disk space
            docker image prune -f
          EOF
